<!DOCTYPE html>
<html>
<head>
    <title>AI Health Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        🩺 AI Health Assistant
        <div class="header-actions">
            <button onclick="toggleTheme()">🌙</button>
            <button onclick="openModal()">🔄</button>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot general">
            <div class="avatar">🤖</div>
            <div class="bubble">
                Hello 👋 Describe your symptoms and I’ll help identify possible conditions.
            </div>
        </div>
    </div>

    <div class="disclaimer">
        ⚠️ This system provides informational guidance only. Please consult a qualified doctor.
    </div>

    <div class="chat-input">
        <input id="userInput" placeholder="Type your symptoms..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- New Chat Modal -->
<div class="modal" id="modal">
    <div class="modal-box">
        <p>Start a new chat?</p>
        <button class="confirm" onclick="clearChat()">Yes</button>
        <button class="cancel" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
function addMessage(text, sender, body="general") {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = `message ${sender} ${body}`;

    msg.innerHTML = `
        <div class="avatar">${sender === "bot" ? "🤖" : "🧑"}</div>
        <div class="bubble">${text}</div>
    `;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => {
        /* Backend should send body_part */
        addMessage(data.reply, "bot", data.body_part || "general");
    });
}

function toggleTheme() {
    document.body.classList.toggle("dark");
}

function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function clearChat() {
    document.getElementById("chatBox").innerHTML = "";
    closeModal();
}
</script>

</body>
</html>
